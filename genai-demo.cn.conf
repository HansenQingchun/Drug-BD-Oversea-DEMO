server {
    listen 80;
    server_name genai-demo.cn;

    # ACME 证书续期验证（Let's Encrypt webroot），优先于跳转
    location ^~ /.well-known/acme-challenge/ {
        root /usr/local/lighthouse/softwares/wordpress;
        allow all;
    }
    # 其余一律跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name genai-demo.cn;

    index index.php index.html index.htm;
    root /usr/local/lighthouse/softwares/wordpress;

    ssl_certificate     /etc/letsencrypt/live/genai-demo.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/genai-demo.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # PHP（宝塔/aaPanel 标准引用，供 WordPress 主站使用）
    include enable-php-83.conf;

    # 子目录：药物出海评估 DEMO（静态 SPA）
    location /drug-demo/ {
        try_files $uri $uri/ /drug-demo/index.html;
    }

    # 其余路径交给原 WordPress
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    access_log /www/wwwlogs/genai-demo.cn.log;
    error_log  /www/wwwlogs/genai-demo.cn.error.log;
}
